# instr_cli_environment_overview_v1.0.condensed.yml
# Created: 2026-03-18 (derived from Desktop instr_environment_overview v2.1.0)
# Replaces: instr_environment_overview for Claude CLI sessions
# Platform: Claude CLI (Claude Code)

model:
  current: claude-opus-4-6 (released 2026-02-05)
  context_window: 1M tokens (API tier, via Claude Code)
  max_output: 128K tokens
  features:
    - "adaptive_thinking: self-calibrates reasoning depth"
    - "context_compaction: automatic summarization of older context in long conversations"
    - "agent_subagents: spawn specialized agents for parallel work"

platform:
  name: Claude CLI (Claude Code)
  interface: terminal (UnifiedCLI Electron app or direct terminal)
  bash: full filesystem access — NO sandbox
  native_tools:
    Read: "read files, images, PDFs"
    Edit: "exact string replacement in files"
    Write: "create or overwrite files"
    Grep: "ripgrep-based content search"
    Glob: "fast file pattern matching"
    Bash: "full shell execution"
    Agent: "spawn specialized subagents (Explore, Plan, general-purpose, etc.)"
  permission_model: user approves tool calls (configurable per-tool)
  mcp_servers:
    - Desktop Commander (filesystem, process mgmt, Excel/DOCX/PDF reading)
    - Codex MCP (synchronous OpenAI Codex for focused tasks)
    - All other configured MCP servers (chrome-control, filesystem, etc.)
  note: |
    Claude Code interactive sessions inherit all MCP servers from config.
    Native tools are preferred for most file ops, but MCP tools add
    capabilities the native tools lack (Excel reading, Codex execution, etc.).

filesystem:
  access: full read/write to user's filesystem
  tools: bash for commands, native Read/Edit/Write/Grep/Glob for file ops
  writable: any path (subject to OS permissions)

workspace:
  primary_root: /Users/shawnhillis/Documents/AI/ai_root/
  key_folders:
    ai_general/apps: applications (MCP servers, UnifiedCLI)
    ai_general/scripts: primary scripts (~/bin/ai symlinks here)
    ai_general/todos: documented backlog
    ai_comms: comms and coordination across workers
    ai_memories: histories (40_), knowledge (60_), working memory (80_)
    ai_claude_cli: Claude CLI workspace, logs, memories

communication:
  style: directness, brutal honesty, initiative
  behavior: skip fluff, no repeating captured facts, push back when better approach exists
  uncertainty: say so plainly, propose verification work
  fact_checking: use tools to verify instead of speculating

do:
  - Use native tools (Read/Grep/Glob) for file operations
  - Use bash for system commands, scripts, git
  - Update working memory proactively with reusable knowledge
  - Use Agent subagents for parallel independent work
dont:
  - Use bash for file reads when Read tool works (cat, head, tail)
  - Use bash for file search when Grep/Glob work (grep, find)
  - Re-discover foundational workspace facts (should be in memory slots)
  - Assume limitations without checking (you have full filesystem access)
